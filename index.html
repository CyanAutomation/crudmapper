<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JSON Permissions Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="app-shell">
      <header class="top-header top-nav">
        <div class="global-nav">
          <div class="brand-shell">
            <p class="brand-eyebrow">JSON Permissions Explorer</p>
            <h1 class="brand-title">Role CRUD Mapper</h1>
          </div>
          <div class="global-nav-search" aria-hidden="true"></div>
          <div class="global-nav-actions" aria-hidden="true"></div>
        </div>
      </header>

      <div class="app-content workspace-shell" id="app-container">
        <aside id="sidebar" class="workspace-sidebar" aria-label="Role navigation">
          <h2 class="sidebar-title">Role Areas</h2>
          <div id="sidebarContent">Loading…</div>
        </aside>

        <main class="workspace-main" aria-label="Role details and permissions">
          <div id="runtimeSourceControls" aria-label="Runtime source controls">
            <p class="upload-title">Load role data</p>
            <label for="roleFileInput">Select JSON files</label>
            <input
              id="roleFileInput"
              type="file"
              accept=".json,application/json"
              multiple
            />
            <div id="roleDropZone" tabindex="0">or drag and drop files here</div>
            <p class="upload-guidance">
              Upload one role file, or drop a manifest plus every referenced role JSON together.
            </p>
          </div>

          <div id="main" class="role-header-shell table-shell insight-grid dense-readable"></div>
        </main>
      </div>
    </div>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
