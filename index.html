<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>myairops Permissions Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="runtimeSourceControls">
      <label for="roleFileInput">Load local role JSON files</label>
      <input
        id="roleFileInput"
        type="file"
        accept=".json,application/json"
        multiple
      />
      <div id="roleDropZone">Drop JSON files here</div>
      <p class="upload-guidance">
        You can upload a single role JSON file directly. For manifest mode, upload the
        manifest JSON and all referenced role JSON files together in the same selection/drop.
      </p>
    </div>

    <div id="app-container">
      <div id="sidebar">
        <h1 class="sidebar-title">Role Areas</h1>
        <div id="sidebarContent">Loading…</div>
      </div>

      <div id="main"></div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
